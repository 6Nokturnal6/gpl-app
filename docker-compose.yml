version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gpl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gpl_db}
      POSTGRES_USER: ${POSTGRES_USER:-gpl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/models/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - gpl_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gpl_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gpl_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-gpl_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gpl_db}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gpl_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gpl_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - gpl_network

  nginx:
    image: nginx:alpine
    container_name: gpl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gpl_network

volumes:
  postgres_data:

networks:
  gpl_network:
    driver: bridge
